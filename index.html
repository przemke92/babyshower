  header.hero{ text-align: center; padding: 44px 20px 30px; }

  .title{ font-family: 'Cormorant Garamond', serif; font-weight: 600; letter-spacing: 0.22em; font-size: clamp(26px, 6vw, 46px); margin: 6px 0 0; color: var(--ink); }
  .subtitle{ margin-top: 20px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(17px, 3vw, 21px); color: var(--ink-soft); max-width: 560px; margin-left: auto; margin-right: auto; }

  .divider{ display:flex; align-items:center; justify-content:center; gap: 14px; margin: 24px auto; max-width: 420px; }
  .divider .rope{ height:1px; flex:1; background: var(--blue); opacity: 0.55; }
  .divider .heart{ color: var(--blue-deep); font-size: 17px; }

  .hero-image-wrap{ width: 100%; max-width: 480px; margin: 22px auto 0; }
  .hero-image{ width: 100%; height: auto; display: block; margin: 0 auto; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }

  .wrap{ max-width: 900px; margin: 0 auto; padding: 20px 20px 80px; }

  /* --- ORIGINAL STYLES (rows tightened slightly) --- */
  .progress-card{ background: white; border: 1px solid var(--line); border-radius: 14px; padding: 14px 20px; display:flex; align-items:center; gap: 18px; margin-bottom: 26px; flex-wrap: wrap; }
  .progress-text{ font-size: 14px; color: var(--ink-soft); white-space: nowrap; }
  .progress-text b{ color: var(--ink); font-weight: 500;}
  .progress-track{ flex: 1; min-width: 120px; height: 8px; background: var(--blue-pale); border-radius: 6px; overflow: hidden; }
  .progress-fill{ height: 100%; background: var(--blue); border-radius: 6px; transition: width .4s ease; }
  .search-box{ width: 100%; padding: 11px 16px; border-radius: 10px; border: 1px solid var(--line); background: white; font-size: 15px; margin-bottom: 30px; font-family: 'Jost', sans-serif; }
  .category{ margin-bottom: 34px; }
  .category-title{ font-family: 'Cormorant Garamond', serif; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; font-size: 19px; color: var(--blue-deep); display:flex; align-items:center; gap: 14px; margin-bottom: 12px; }
  .category-title::after{ content:""; flex:1; height:1px; background: var(--line); }
  .items{ display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  @media (max-width: 620px){ .items{ grid-template-columns: 1fr; } }
  .item{ background: white; border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; display:flex; flex-direction: column; gap: 6px; }
  .item.is-taken{ background: var(--cream-2); }
  .item-top{ display:flex; align-items:flex-start; justify-content: space-between; gap: 10px; font-size: 14px; }
  .item-name{ flex: 1; }
  .badge{ font-size: 10px; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .badge.free{ color: var(--free); border: 1px solid var(--free); }
  .badge.taken{ color: white; background: var(--taken); }
  .item-link a{ font-size: 12px; color: var(--blue-deep); text-decoration: none; border-bottom: 1px solid var(--blue); }
  .item-bottom{ display:flex; align-items:center; justify-content: space-between; gap: 10px; margin-top: 2px; }
  .taken-by{ font-size: 12px; color: var(--ink-soft); }
  button.claim-btn, button.release-btn{ font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 8px; cursor: pointer; border: 1px solid var(--blue); }
  button.claim-btn{ background: var(--blue); color: white; }
  button.release-btn{ background: transparent; border-color: var(--line); color: var(--ink-soft); }
  .empty-state{ color: var(--ink-soft); font-size: 14px; padding: 20px 0; }

let claims = {};

const categoriesEl = document.getElementById('categories');
const searchBox = document.getElementById('searchBox');
const progressText = document.getElementById('progressText');
const progressFill = document.getElementById('progressFill');

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function updateProgress(){
  let total = 0, taken = 0;
  DATA.forEach(cat => cat.items.forEach(it => {
    total++;
    if (claims[it.id]) taken++;
  }));
  progressText.innerHTML = `<b>${taken}</b> z <b>${total}</b> rzeczy zaklepanych`;
  progressFill.style.width = total ? (taken / total * 100) + '%' : '0%';
}

function render(){
  const q = searchBox.value.trim().toLowerCase();
  categoriesEl.innerHTML = '';
  let anyVisible = false;

  DATA.forEach(cat => {
    const visibleItems = cat.items.filter(it => it.name.toLowerCase().includes(q));
    if (visibleItems.length === 0) return;
    anyVisible = true;

    const catEl = document.createElement('div');
    catEl.className = 'category';

    const title = document.createElement('div');
    title.className = 'category-title';
    title.textContent = cat.category;
    catEl.appendChild(title);

    const itemsEl = document.createElement('div');
    itemsEl.className = 'items';

    visibleItems.forEach(it => {
      const taken = claims[it.id];
      const itemEl = document.createElement('div');
      itemEl.className = 'item' + (taken ? ' is-taken' : '');

      let html = `
        <div class="item-top">
          <span class="item-name">${escapeHtml(it.name)}</span>
          <span class="badge ${taken ? 'taken' : 'free'}">${taken ? 'Zaklepane' : 'Wolne'}</span>
        </div>
      `;
      if (it.link) {
        html += `<div class="item-link"><a href="${it.link}" target="_blank" rel="noopener noreferrer">Zobacz propozycję</a></div>`;
      }

      if (taken) {
        html += `
          <div class="item-bottom">
            <span class="taken-by">Zaklepane przez: ${escapeHtml(taken.name || '')}</span>
            <button class="release-btn" data-id="${it.id}">Odklepuję</button>
          </div>
        `;
      } else if (openClaimFormId === it.id) {
        html += `
          <form class="claim-form" data-id="${it.id}">
            <input type="text" placeholder="Twoje imię" required maxlength="40" autofocus>
            <button type="submit">Potwierdź</button>
          </form>
        `;
      } else {
        html += `
          <div class="item-bottom">
            <span></span>
            <button class="claim-btn" data-id="${it.id}">Zaklepuję</button>
          </div>
        `;
      }

      itemEl.innerHTML = html;
      itemsEl.appendChild(itemEl);
    });

    catEl.appendChild(itemsEl);
    categoriesEl.appendChild(catEl);
  });

  if (!anyVisible) {
    categoriesEl.innerHTML = '<div class="empty-state">Brak pasujących produktów.</div>';
  }

  // wire up buttons/forms for this render pass
  categoriesEl.querySelectorAll('.claim-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      openClaimFormId = btn.dataset.id;
      render();
    });
  });

  categoriesEl.querySelectorAll('.release-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (confirm('Na pewno odklepujesz ten prezent?')) {
        claimsRef.child(btn.dataset.id).remove();
      }
    });
  });

  categoriesEl.querySelectorAll('.claim-form').forEach(form => {
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const input = form.querySelector('input');
      const name = input.value.trim();
      if (!name) return;
      claimsRef.child(form.dataset.id).set({ name, ts: Date.now() });
      openClaimFormId = null;
    });
  });

  updateProgress();
}

claimsRef.on('value', (snapshot) => {
  claims = snapshot.val() || {};
  render();
});

searchBox.addEventListener('input', render);

render();
</script>

</body>
</html>
