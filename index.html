<style>
  :root{
    --cream: #fdfbf7;
    --cream-2: #f2ecdf;
    --ink: #3a352f;
    --ink-soft: #6b6459;
    --blue: #7c94a8;
    --blue-deep: #55738b;
    --blue-pale: #e4ebf0;
    --line: #d9cfc0;
    --free: #6b8f71;
    --taken: #b0724f;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{ margin:0; background: var(--cream); color: var(--ink); font-family: 'Jost', sans-serif; font-weight: 300; line-height: 1.5; }

  /* --- HERO IMAGE STYLING --- */
  .hero-container{
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    padding: 40px 20px 20px;
  }
  .hero-image{
    width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  }

  .wrap{ max-width: 900px; margin: 0 auto; padding: 20px 20px 80px; }

  /* --- ORIGINAL STYLES --- */
  .progress-card{ background: white; border: 1px solid var(--line); border-radius: 14px; padding: 18px 22px; display:flex; align-items:center; gap: 18px; margin-bottom: 30px; flex-wrap: wrap; }
  .progress-text{ font-size: 14px; color: var(--ink-soft); white-space: nowrap; }
  .progress-text b{ color: var(--ink); font-weight: 500;}
  .progress-track{ flex: 1; min-width: 120px; height: 8px; background: var(--blue-pale); border-radius: 6px; overflow: hidden; }
  .progress-fill{ height: 100%; background: var(--blue); border-radius: 6px; transition: width .4s ease; }
  .search-box{ width: 100%; padding: 13px 16px; border-radius: 10px; border: 1px solid var(--line); background: white; font-size: 15px; margin-bottom: 36px; }
  .category{ margin-bottom: 46px; }
  .category-title{ font-family: 'Cormorant Garamond', serif; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; font-size: 20px; color: var(--blue-deep); display:flex; align-items:center; gap: 14px; margin-bottom: 16px; }
  .category-title::after{ content:""; flex:1; height:1px; background: var(--line); }
  .items{ display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media (max-width: 620px){ .items{ grid-template-columns: 1fr; } }
  .item{ background: white; border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; display:flex; flex-direction: column; gap: 8px; }
  .item.is-taken{ background: var(--cream-2); }
  .badge{ font-size: 11px; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
  .badge.free{ color: var(--free); border: 1px solid var(--free); }
  .badge.taken{ color: white; background: var(--taken); }
  .item-link a{ font-size: 13px; color: var(--blue-deep); text-decoration: none; border-bottom: 1px solid var(--blue); }
  .item-bottom{ display:flex; align-items:center; justify-content: space-between; gap: 10px; margin-top: 4px; }
  button.claim-btn, button.release-btn{ font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 8px; cursor: pointer; border: 1px solid var(--blue); }
  button.claim-btn{ background: var(--blue); color: white; }
  button.release-btn{ background: transparent; border-color: var(--line); color: var(--ink-soft); }
</style>
